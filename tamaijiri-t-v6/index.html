<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#0d1016"><title>玉いじりT</title><link rel="stylesheet" href="style.css"></head><body><main class="app"><header><div><small>BIG DREAM TRACKER</small><h1>現在 <span id="count">0</span>球</h1></div><button id="menuBtn">☰</button></header><section class="last"><div><small>直前の記録</small><strong id="last">まだありません</strong></div><button id="undoBtn">1つ戻す</button></section><section class="balls"><h2>落ちた玉の色を押す</h2><div class="grid"><button class="ball blue" data-color="青"><i></i><b>青</b></button><button class="ball green" data-color="緑"><i></i><b>緑</b></button><button class="ball red" data-color="赤"><i></i><b>赤</b></button><button class="ball gold" data-color="金"><i></i><b>金</b></button></div></section><section class="actions"><button id="voiceBtn" class="voice">🎙 ボイス記録</button><button id="historyBtn">履歴・修正</button></section><footer>玉いじりT</footer></main><div id="stageModal" class="overlay" hidden><div class="sheet"><div class="head"><h2>突破結果</h2><button data-close="stageModal">×</button></div><p id="stageText"></p><div class="stageGrid"><button data-stage="失敗">失敗</button><button data-stage="1段階突破">1段階突破</button><button data-stage="2段階突破">2段階突破</button><button data-stage="最終突破" class="final">最終突破</button></div><button id="laterBtn" class="sub">あとで記録</button></div></div><div id="voiceModal" class="overlay" hidden><div class="sheet tall"><div class="head"><h2 id="voiceTitle">ボイス記録</h2><button data-close="voiceModal">×</button></div><label class="countField">記録する球数<input id="voiceCount" type="number" min="0"></label><div id="voiceList" class="voiceList"></div></div></div><div id="historyModal" class="overlay" hidden><div class="sheet tall"><div class="head"><h2>履歴・修正</h2><button data-close="historyModal">×</button></div><button id="addVoicePast" class="primary">＋ 過去の球数へボイス追加</button><div id="historyList" class="history"></div></div></div><div id="editModal" class="overlay" hidden><div class="sheet"><div class="head"><h2>記録を編集</h2><button data-close="editModal">×</button></div><div id="editBody"></div></div></div><div id="menuModal" class="overlay" hidden><div class="sheet"><div class="head"><h2>メニュー</h2><button data-close="menuModal">×</button></div><button id="reportBtn" class="primary">実戦レポートを共有</button><button id="resetBtn" class="danger">現在の実戦をリセット</button></div></div><div id="confirmModal" class="overlay" hidden><div class="confirm"><h2>リセットしますか？</h2><p>球数と履歴をすべて0に戻します。</p><div><button data-close="confirmModal">キャンセル</button><button id="confirmReset" class="danger">リセット</button></div></div></div><script src="app-v2.js"></script></body></html>
